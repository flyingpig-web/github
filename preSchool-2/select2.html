<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>무대위의 풍물놀이</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="container">
          <a href="index.html" class="btn-top btn-home" role="button">
            <span class="sr-only">홈으로</span>
          </a>

          <a
            href="index.html"
            class="btn-top btn-back"
            role="button"
            onclick="window.history.back()"
          >
            <span class="sr-only">뒤로가기</span>
          </a>

          <div class="dimmed bg tutorial-bg-2">
            <div class="close" role="button"></div>
          </div>

          <div class="select-main-2">
            <!-- 타원 궤도 -->
            <div class="ellipse-track"></div>

            <!-- 중앙 회전 요소 -->
            <div class="center-element">
              <img src="img/select/center-disc.png" alt="중앙 원반" />
            </div>

            <div class="moon" data-angle="0">
              <img src="img/select/moon.png" alt="달" id="moon" />
            </div>

            <img
              src="img/select/select-2-person-1.png"
              alt="사람1"
              id="person-1"
              class="person"
            />
            <img
              src="img/select/select-2-person-2.png"
              alt="사람2"
              id="person-2"
              class="person"
            />
            <img
              src="img/select/select-2-person-3.png"
              alt="사람3"
              id="person-3"
              class="person"
            />

            <div class="lyrics-wrapper"></div>
            <div class="good-wrapper"></div>
          </div>

          <div class="select-completed dimmed display-none">
            <div class="complete-animation" style="left: 22.5%"></div>
            <div class="complete-animation" style="left: 68%"></div>
            <img
              src="img/select/success-ment-2.png"
              alt="성공"
              class="success-ment"
            />
          </div>

          <div class="songpyun-before dimmed display-none">
            <img
              src="img/select/select-2-songpyun.png"
              alt="송편"
              class="select-2-songpyun pointer-none"
              role="button"
            />
            <img
              src="img/select/select-2-songpyun-half.png"
              alt="송편"
              class="select-2-songpyun-half"
              role="button"
            />
            <img
              src="img/common/message.png"
              alt="쪽지"
              class="message"
              role="button"
            />

            <img
              src="img/common/replay.png"
              alt="다시하기"
              role="button"
              onclick="location.reload()"
              style="width: 15vw; height: 10vh; top: 80%; left: 40%"
            />

            <img
              src="img/common/exit.png"
              alt="나가기"
              role="button"
              onclick="window.location.href='main.html'"
              style="width: 15vw; height: 10vh; top: 80%; left: 60%"
            />
          </div>

          <div class="message-content-2 dimmed display-none">
            <img
              class="message-content-close"
              role="button"
              src="img/common/close.png"
              style="
                width: 10vw;
                height: 10vh;
                position: absolute;
                top: 13%;
                right: 25%;
              "
            />
            <img
              src="img/common/download.png"
              class="download-btn"
              role="button"
            />
          </div>
        </div>
      </div>
    </main>

    <audio id="bgm-tutorial" src="sound/dubs/yu2_12.mp3"></audio>
    <audio id="bgm-main" src="sound/dubs/yu2_13.mp3"></audio>
    <audio id="bgm-stage-1" src="sound/dubs/yu2_14.mp3"></audio>
    <audio id="bgm-stage-2" src="sound/dubs/yu2_15.mp3"></audio>
    <audio id="bgm-stage-3" src="sound/dubs/yu2_16.mp3"></audio>
    <audio id="bgm-finish" src="sound/dubs/yu2_17.mp3"></audio>

    <audio
      id="select-2-main-play"
      src="sound/external/select-2-main-play.mp3"
      loop
    ></audio>

    <audio id="success-ment" src="sound/dubs/yu2_18.mp3"></audio>
    <audio id="success-ment-2" src="sound/dubs/yu2_19.mp3"></audio>
    <audio id="message-sound" src="sound/dubs/yu2_20.mp3"></audio>

    <audio id="bgm-card-open" src="sound/sfx/card_open_02.wav"></audio>
    <script src="js/common.js"></script>
    <script src="js/select-2.js"></script>
  </body>
</html>
