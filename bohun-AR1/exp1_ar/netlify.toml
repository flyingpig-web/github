[build]
  publish = "."

[[headers]]
  for = "/Build/*.br"
  [headers.values]
    Content-Type = "application/octet-stream"

[[headers]]
  for = "/Build/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "/Build/*.js"
  [headers.values]
    Content-Type = "application/javascript"
