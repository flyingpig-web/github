<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity WebGL Player | webAR_narasarang_AR</title>
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
        html{
            height: 100%;
            height: -webkit-fill-available;
            height: 100dvh;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            min-height: -webkit-fill-available;
            min-height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            inset: 0;
            background: #1a1a1e;
        }
        #video-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        #unity-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            height: 100dvh;
        }
        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            background: transparent !important;
        }
        body.loading-active #unity-container,
        body.loading-active #video-canvas {
            visibility: hidden;
            pointer-events: none;
        }
        .ctaDiv {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            inset: 0;
            background: #fffa;
            z-index: 9998;
        }
        #unity-loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: #1a1a1e;
            z-index: 9999;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
            text-align: center;
            padding: max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
            box-sizing: border-box;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            overflow: hidden;
        }
        #unity-loading-overlay.is-visible {
            display: flex;
        }
        .loading-content {
            width: min(88vw, 280px);
            max-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .loading-spinner {
            width: clamp(32px, 8vmin, 40px);
            height: clamp(32px, 8vmin, 40px);
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #62a7fe;
            border-radius: 50%;
            animation: loading-spin 0.9s linear infinite;
            margin-bottom: clamp(12px, 3vmin, 16px);
            flex-shrink: 0;
        }
        @keyframes loading-spin {
            to { transform: rotate(360deg); }
        }
        #loading-title {
            margin: 0 0 6px;
            font-size: clamp(13px, 3.6vmin, 16px);
            font-weight: 700;
            letter-spacing: 0.02em;
            line-height: 1.3;
        }
        #loading-percent {
            margin: 0 0 10px;
            font-size: clamp(20px, 5.5vmin, 26px);
            font-weight: 700;
            color: #62a7fe;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }
        .loading-progress-track {
            width: 100%;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            overflow: hidden;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        #loading-progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #4a8fd4, #62a7fe);
            transition: width 0.2s ease;
        }
        #loading-status {
            margin: 0 0 6px;
            font-size: clamp(11px, 2.8vmin, 13px);
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.45;
            word-break: keep-all;
        }
        #loading-hint {
            margin: 0;
            font-size: clamp(10px, 2.4vmin, 11px);
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.45;
            word-break: keep-all;
        }
    </style>
</head>
<body>
    <video id="webcam-video" muted autoplay playsinline style="width:1px;position:absolute;opacity:0;pointer-events:none"></video>
    <canvas id="video-canvas" style="display:none"></canvas>
    <div id="startARDiv" class="ctaDiv">
        <select id="chooseCamSel" style="display: none;" onchange="SelectCam()"></select>
        <p style="text-align: center; width:60vw">AR 콘텐츠를 체험하려면<br>장치의 카메라 기능을 사용하도록 허락해주세요.<br>네트워크 상태에 따라 <br>로딩 시간이 길어질 수 있습니다. <br>잠시만 기다려 주세요.</p>
        <button id="startARButton" style="display:none" onclick="StartAR()">ALLOW ACCESS</button>
    </div>
    <div id="screenshotDiv" style="display: none;" class="ctaDiv">
        <div style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3), 0 6px 20px 0 rgba(0, 0, 0, 0.25);">
            <img id="screenshotImg" src="" alt="screenshot" style="width:80vw; height:80vh">
            <button onclick="document.getElementById('screenshotDiv').style.display = 'none';" style="position:absolute; transform:translateY(-100%); right:0; top:0">Close</button>
        </div>
    </div>
    <div id="errorDiv" class="ctaDiv" style="display: none; background:#aaa">
        <p id="errorText" style="text-align: center; width:60vw; color:white"></p>
    </div>
    <div id="unity-container" class="unity-mobile">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>
    <div id="unity-loading-overlay" aria-live="polite" aria-busy="true">
        <div class="loading-content">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p id="loading-title">콘텐츠 로딩 중</p>
            <p id="loading-percent">0%</p>
            <div class="loading-progress-track" aria-hidden="true">
                <div id="loading-progress-fill"></div>
            </div>
            <p id="loading-status">파일을 다운로드하고 있습니다</p>
            <p id="loading-hint">처음 접속 시 1분 이상 걸릴 수 있습니다.<br>화면을 닫지 말고 잠시만 기다려 주세요.</p>
        </div>
    </div>
    <script src="arcamera.js" type="text/javascript"></script>
    <script src="wtracker.js" type="text/javascript"></script>
    <script src="Build/ar_01.loader.js"></script>
    <script>
		var isPCMode = !isMobileDevice();
        var initialize = async() =>{
            var unityCanvas = document.querySelector("#unity-canvas");
            var videoCanvas = document.querySelector("#video-canvas");
            window.arCamera = new ARCamera(unityCanvas, videoCanvas);
            window.wTracker = new WorldTracker(arCamera);
            try{
                await wTracker.initialize("./opencv.js");
                console.log("World tracker initialized!");   
            }
            catch (error) {
                console.error("Failed to initialize world tracker. Are you missing opencv.js?", error);
                ShowError("Failed to initialize the World Tracker.\n" + error);
                return;
            }

            await LoadWebcams();
			document.getElementById("startARButton").style.display = "block";
        }

        initialize();

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var loadingOverlay = document.querySelector("#unity-loading-overlay");
        var loadingPercent = document.querySelector("#loading-percent");
        var loadingProgressFill = document.querySelector("#loading-progress-fill");
        var loadingStatus = document.querySelector("#loading-status");
        var loadingHint = document.querySelector("#loading-hint");
        var loadingStartedAt = 0;
        var lastReportedProgress = 0;
        var lastProgressAt = 0;
        var loadingWatchdogTimer = null;

        window.addEventListener("resize", function () {
            resizeUnityCanvas();
        });

        function isMobileDevice() {
            return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        }

        function formatElapsed(seconds) {
            var mins = Math.floor(seconds / 60);
            var secs = seconds % 60;
            if (mins > 0) {
                return mins + "분 " + secs + "초";
            }
            return secs + "초";
        }

        function stopLoadingWatchdog() {
            if (loadingWatchdogTimer) {
                clearInterval(loadingWatchdogTimer);
                loadingWatchdogTimer = null;
            }
        }

        function startLoadingWatchdog() {
            stopLoadingWatchdog();
            loadingStartedAt = Date.now();
            lastReportedProgress = 0;
            lastProgressAt = Date.now();

            loadingWatchdogTimer = setInterval(function () {
                var elapsed = Math.floor((Date.now() - loadingStartedAt) / 1000);
                var stalledFor = Math.floor((Date.now() - lastProgressAt) / 1000);
                var baseHint = "처음 접속 시 1분 이상 걸릴 수 있습니다.<br>화면을 닫지 말고 잠시만 기다려 주세요.";

                loadingHint.innerHTML = "경과 시간: " + formatElapsed(elapsed) + "<br>" + baseHint;

                if (lastReportedProgress >= 0.9 && stalledFor >= 5) {
                    loadingStatus.textContent = "WebAssembly 엔진 컴파일 중입니다 (1~3분)";
                } else if (stalledFor >= 20 && lastReportedProgress < 0.05) {
                    loadingStatus.textContent = "다운로드가 지연되고 있습니다. 네트워크를 확인해 주세요.";
                } else if (stalledFor >= 45) {
                    loadingStatus.textContent = "로딩이 오래 걸리고 있습니다. 잠시만 더 기다려 주세요.";
                }
            }, 1000);
        }

        function getLoadingStatusMessage(progress) {
            if (progress < 0.2) {
                return "필수 파일을 다운로드하고 있습니다";
            }
            if (progress < 0.7) {
                return "게임 데이터를 받는 중입니다";
            }
            if (progress < 0.95) {
                return "거의 완료되었습니다";
            }
            return "게임을 준비하고 있습니다";
        }

        function updateLoadingProgress(progress) {
            var percent = Math.min(100, Math.max(0, Math.round(progress * 100)));
            loadingPercent.textContent = percent + "%";
            loadingProgressFill.style.width = percent + "%";
            progressBarFull.style.width = percent + "%";

            if (progress > lastReportedProgress + 0.001) {
                lastReportedProgress = progress;
                lastProgressAt = Date.now();
            }

            if (progress >= 0.9) {
                loadingStatus.textContent = "WebAssembly 엔진 컴파일 중입니다 (1~3분)";
            } else {
                loadingStatus.textContent = getLoadingStatusMessage(progress);
            }
        }

        function resizeUnityCanvas() {
            var width = window.innerWidth;
            var height = window.innerHeight;

            if (container) {
                container.style.width = width + "px";
                container.style.height = height + "px";
            }

            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
        }

        function showLoadingOverlay() {
            document.body.classList.add("loading-active");
            updateLoadingProgress(0);
            loadingOverlay.classList.add("is-visible");

            var videoCanvas = document.querySelector("#video-canvas");
            if (videoCanvas) {
                videoCanvas.style.display = "none";
            }

            if (loadingBar) {
                loadingBar.style.display = "none";
            }

            startLoadingWatchdog();
        }

        function hideLoadingOverlay() {
            document.body.classList.remove("loading-active");
            stopLoadingWatchdog();
            loadingOverlay.classList.remove("is-visible");

            if (loadingBar) {
                loadingBar.style.display = "none";
            }

            if (!isPCMode) {
                var videoCanvas = document.querySelector("#video-canvas");
                if (videoCanvas) {
                    videoCanvas.style.display = "block";
                }
            }
        }

        async function waitForUnityInstance() {
            if (window.unityInstance) {
                return window.unityInstance;
            }
            if (!window.unityInstancePromise) {
                throw new Error("Unity instance is not ready yet.");
            }
            return await window.unityInstancePromise;
        }

        function sendMessageToARCamera(methodName) {
            return waitForUnityInstance()
                .then((unityInstance) => {
                    unityInstance.SendMessage('ARCamera', methodName);
                })
                .catch((err) => {
                    console.error("Failed to send message to ARCamera - ", err);
                });
        }

        function StartAR() {
            try {
                safeOpenFullscreen('landscape');
                resizeUnityCanvas();

                document.getElementById('startARDiv').style.display = 'none';
                showLoadingOverlay();

                if (!isPCMode) {
                    RequestWebcam();
                    StartMotionSensors();
                } else {
                    const videoCanvas = document.querySelector("#video-canvas");
                    if (videoCanvas) {
                        videoCanvas.style.display = "none";
                    }
                }

                window.unityInstancePromise = createUnityInstance(document.querySelector("#unity-canvas"), {
                        dataUrl: "Build/ar_01.data.unityweb",
                        frameworkUrl: "Build/ar_01.framework.js.unityweb",
                        codeUrl: "Build/ar_01.wasm.unityweb",
                        streamingAssetsUrl: "StreamingAssets",
                        companyName: "DefaultCompany",
                        productName: "webAR_narasarang_AR",
                        productVersion: "0.1",
                        },
                        (progress) => {
                            updateLoadingProgress(progress);
                        }
                    ).then((unityInstance) => {
                    window.unityInstance = unityInstance;
                    updateLoadingProgress(1);
                    loadingStatus.textContent = "로딩 완료";
                    if (isPCMode == true)
                    {
                        //window.unityInstance.SendMessage('AR4_manager', 'SetPCMode');
                    }
                    setTimeout(hideLoadingOverlay, 300);
                    return unityInstance;
                }).catch((message) => {
                    console.error("Failed to create Unity instance - ", message);
                    ShowError("AR 콘텐츠 로딩에 실패했습니다.\n\n" + message + "\n\n네트워크 연결을 확인한 뒤 페이지를 새로고침해 주세요.");
                    hideLoadingOverlay();
                });
            } catch (err) {
                console.error("StartAR failed - ", err);
                ShowError("AR 시작 중 오류가 발생했습니다.\n\n" + err);
                hideLoadingOverlay();
            }
        }

        //Set Facing Mode here ('environment', 'user', '')
		window.unityFacingMode = "environment"

        window.WEBCAM_SETTINGS = {
            video: {
                facingMode: unityFacingMode,
            },
            audio: false
        };
        window.requestingForCameraPermission = false;
        async function RequestWebcam(){
            window.requestingForCameraPermission = true;
            try{
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                arCamera.setFlipped(window.WEBCAM_SETTINGS.video.facingMode == 'user');
                
                console.log("Webcam access granted");
                requestingForCameraPermission = false;
                return true;
            }
            catch (err) {
                console.warn("getUserMedia error - ", err);
                window.webcamStream = null;
                requestingForCameraPermission = false;
                return false;
            }           
        }

        function SetPCMode(enabled) {
            isPCMode = !!enabled;
            console.log("SetPCMode ->", isPCMode);

            if (isPCMode) {
                const videoCanvas = document.querySelector("#video-canvas");
                if (videoCanvas) {
                    videoCanvas.style.display = "none";
                }
            }
        }

        async function EnableARMode() {
            SetPCMode(false);

            const videoCanvas = document.querySelector("#video-canvas");
            if (videoCanvas) {
                videoCanvas.style.display = "block";
            }

            const granted = await RequestWebcam();
            if (!granted) {
                ShowError("Failed to start the experience. Camera permission was denied");
                return;
            }

            await StartWebcam();
            StartMotionSensors();
        }

        async function StartWebcam(){
            console.log("StartWebcam, isPCMode=" + isPCMode);

            if (isPCMode) {
                const videoCanvas = document.querySelector("#video-canvas");
                if (videoCanvas) {
                    videoCanvas.style.display = "none";
                }
                await sendMessageToARCamera('OnStartWebcamSuccess');
                return;
            }

            while (window.requestingForCameraPermission) {
                console.log("Waiting for permissions...");
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            if (!window.webcamStream) {
                const granted = await RequestWebcam();
                if (!granted) {
                    console.error("Webcam failed to start - permission not granted");
                    await sendMessageToARCamera('OnStartWebcamFail');
                    return;
                }
            }

            console.log("Got Permissions");

            if(window.webcamStream)
            {
                const video = document.querySelector("#webcam-video");
                video.srcObject = webcamStream;
                try {
                    await arCamera.startWebcam(video);
                    console.log("Webcam started successfully");
                    await sendMessageToARCamera('OnStartWebcamSuccess');
                }
                catch(err){
                    console.error("Webcam failed to start - ", err);
                    await sendMessageToARCamera('OnStartWebcamFail');
                }   
            }
            else{
                console.error("Webcam failed to start - permission not yet granted");
                await sendMessageToARCamera('OnStartWebcamFail');
            }  
        }

        async function LoadWebcams(){
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                isPCMode = true;
                document.getElementById("chooseCamSel").style.display = "none";
                document.getElementById("startARButton").style.display = "block";
                return;
            }

            let camDevices = [];
            let devices = await navigator.mediaDevices.enumerateDevices();
            var ctr = 0;
            devices.forEach(mediaDevice => {
                if (mediaDevice.kind === 'videoinput') {

                    if(window.unityFacingMode == 'environment' && !mediaDevice.label.includes('facing front')){
                        //back cam only
                        camDevices.push(mediaDevice);
                    }
                    else if(window.unityFacingMode == 'user' && mediaDevice.label.includes('facing front')){
                        //front cam only
                        camDevices.push(mediaDevice);
                    }
                    else{
                        //back and front
                        camDevices.push(mediaDevice);
                        console.log('pushed', mediaDevice);
                    }   
                    
                    ctr++;
                }
            });
			var select = document.getElementById("chooseCamSel");
			if (ctr > 0)
			{
				select.style.display = "block";
			}
			else
			{
				select.style.display = "none";
			}
			var count = 0;
			//reverse array because some Android phones can't distinguish front and back cams at first load
			//and when this happens, most of the time, front cam goes first and back cam goes last
			
			try
			{
				camDevices = camDevices.reverse();
				camDevices.forEach(mediaDevice =>
				{
					const option = document.createElement('option');
					option.value = mediaDevice.deviceId;
					let label = `Camera ${count}`;
					if (mediaDevice.label)
					{
						label = mediaDevice.label
					}
					const textNode = document.createTextNode(label);
					option.appendChild(textNode);
					select.appendChild(option);
					count++;
				});
                wTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
				if (count == 0)
				{
					isPCMode = true;
				}
				else if (!isMobileDevice())
				{
					isPCMode = true;
				}
			}
			catch(err){
                console.error("Webcam Error - ", err);
				isPCMode = true;
				//StartAR();
			}

			//camDevices = camDevices.reverse();
			//camDevices.forEach(mediaDevice => {
				//const option = document.createElement('option');
				//option.value = mediaDevice.deviceId;
				//let label = `Camera ${count}`;
				//if (mediaDevice.label) {
					//label = mediaDevice.label
				//}
				//const textNode = document.createTextNode(label);
				//option.appendChild(textNode);
				//select.appendChild(option);
				//count++;
			//});
			//wTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
			//SelectCam(); //let's assume the normal camera is index 0 and avoid wide cameras
        }
        function SelectCam(){
            var select = document.getElementById("chooseCamSel");
            window.deviceId = select.value;
            window.WEBCAM_SETTINGS.video['deviceId'] = deviceId;
            //console.log(window.WEBCAM_SETTINGS);
            wTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;

            console.log("selecting camera index [" + select.selectedIndex + "] -> " + wTracker.WEBCAM_NAME);

        }

        async function FlipCam(){
            arCamera.stopWebcam();
            window.WEBCAM_SETTINGS.video.deviceId = '';

            if(window.WEBCAM_SETTINGS.video.facingMode == 'user'){
                 window.WEBCAM_SETTINGS.video.facingMode = 'environment';
                arCamera.setFlipped(false);
            }
            else{
                window.WEBCAM_SETTINGS.video.facingMode = 'user';
                arCamera.setFlipped(true);
            }
            window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);

            const video = document.querySelector("#webcam-video");
            video.srcObject = webcamStream;

            await arCamera.startWebcam(video);
        }

        function StartMotionSensors(){
            window.wTracker.startAngles()
            .then(()=>{
                console.log("Motion sensors started");
            })
            .catch(error=>{
                console.error("Failed to start motion sensors - " + error);
                //ShowError("Failed to start the experience. " + error);

            });
        }

        function StartGPS(){            
            window.wTracker.startGPS()
            .then((pos)=>{
                console.log("GPS started", pos);
            })
            .catch(error=>{
                console.error("Failed to start GPS - " + error);
                //ShowError("Failed to start GPS " + error);
            });
        }
        

        function ShowError(error){
            document.getElementById("errorDiv").style.display = "flex";
            document.getElementById("errorText").innerHTML = error;
        }

        function ShowScreenshot(dataUrl){
            document.getElementById("screenshotDiv").style.display = "flex";
            document.getElementById("screenshotImg").src = dataUrl;
            document.getElementById("screenshotImg").style.width = "80vw";
            document.getElementById("screenshotImg").style.height = 80 / window.innerWidth * window.innerHeight + "vw";
        }

        function safeOpenFullscreen(type) {
            if (!isMobileDevice()) {
                return;
            }

            try {
                const elem = canvas;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(function () {});
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                }

                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock(type).catch(function () {});
                }
            } catch (err) {
                console.warn("Fullscreen/orientation not available - ", err);
            }
        }

        function detectBrowswerName() {
            let userAgent = navigator.userAgent;
            let browserName;

            if (userAgent.match(/chrome|chromium|crios/i)) {
                browserName = 'chrome';
            } else if (userAgent.match(/firefox|fxios/i)) {
                browserName = 'firefox';
            } else if (userAgent.match(/safari/i)) {
                browserName = 'safari';
            } else if (userAgent.match(/opr\//i)) {
                browserName = 'opera';
            } else if (userAgent.match(/edg/i)) {
                browserName = 'edge';
            } else {
                browserName = 'No browser detection';
            }
            alert(`${browserName}`)
            return browserName
        }
    </script>
</body>
</html>
