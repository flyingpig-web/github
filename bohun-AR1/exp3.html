<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>EXP③ — 서신 전달</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" type="text/css" media="screen" href="css/import.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.js"></script>
    <script src="js/preload-manifest.js"></script>
    <script src="js/common.js"></script>
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="container">
          <div class="cut-bg exp3-map"></div>
          <canvas class="game-canvas" id="exp3Canvas"></canvas>

          <!-- 진행 게이지(서신 n/3) -->
          <div class="game-gage">
            <img class="gage-bg" src="img/common/exp_gage_bg.png" alt="" />
            <div class="gage-fill" id="gageFill"></div>
            <span class="gage-text" id="gageText">서신 0/3</span>
          </div>

          <!-- 상단 버튼(중앙): 설정 - 튜토리얼 - 나가기 -->
          <div class="game-top">
            <button class="btn-top" id="btnSetting"><img src="img/6_EXP3/btn_setting.png" alt="설정" /></button>
            <button class="btn-top" id="btnInfo"><img src="img/6_EXP3/btn_info.png" alt="튜토리얼" /></button>
            <button class="btn-top" id="btnHome"><img src="img/common/btn_home.png" alt="나가기" /></button>
          </div>

          <!-- 토스트(지대 전달 안내) -->
          <span class="exp3-toast" id="toast"></span>

          <!-- 서신 수신 안내(이미지, 화면 중앙) -->
          <div class="exp3-msg" id="exp3Msg">
            <img src="img/6_EXP3/exp3_msg_text.png" alt="총사령부로부터 각 지대로 전달할 서신을 받았다!" />
          </div>

          <!-- 가상 조이스틱 -->
          <div class="joystick" id="joystick">
            <img class="joy-bg" src="img/6_EXP3/exp_joystick_bg.png" alt="" />
            <img class="joy-stick" id="joyStick" src="img/6_EXP3/exp_joystick.png" alt="조이스틱" />
          </div>

          <!-- 시작 오버레이(시작 메시지 미사용 — 진입 시 방법 안내 팝업이 게이트) -->
          <div class="game-start display-none" id="gameStart">
            <img class="start-msg" src="img/6_EXP3/exp3_msg_start.png" alt="" />
            <img class="start-touch" src="img/1_INTRO/icon_touch.png" alt="터치하여 시작" />
          </div>

          <!-- 설정 팝업 -->
          <div class="dimmed" id="settingDim">
            <div class="dialog setting">
              <img class="popup-base" src="img/common/exp_setting.png" alt="설정" />
              <button class="btn-close" id="setClose"><img src="img/6_EXP3/btn_close.png" alt="닫기" /></button>
              <button class="toggle toggle-bgm" id="toggleBgm" data-img-on="img/common/btn_toggle_on.png" data-img-off="img/common/btn_toggle_off.png">
                <img src="img/common/btn_toggle_on.png" alt="배경음" />
              </button>
              <button class="toggle toggle-sfx" id="toggleSfx" data-img-on="img/common/btn_toggle_on.png" data-img-off="img/common/btn_toggle_off.png">
                <img src="img/common/btn_toggle_on.png" alt="효과음" />
              </button>
            </div>
          </div>

          <!-- 튜토리얼 팝업 -->
          <div class="dimmed" id="tutorialDim">
            <div class="dialog tutorial">
              <img class="popup-base" src="img/6_EXP3/exp3_info.png" alt="게임 방법" />
              <button class="btn-close" id="tutClose"><img src="img/6_EXP3/btn_close.png" alt="닫기" /></button>
            </div>
          </div>

          <!-- 완료 팝업 -->
          <div class="dimmed" id="finishDim">
            <div class="dialog finish">
              <img class="finish-base" src="img/6_EXP3/exp3_popup_finish.png" alt="서신 전달 완료" />
              <img class="finish-stamp" src="img/common/clear_stamp.png" alt="성공" />
              <div class="finish-btns">
                <button id="btnNext"><img src="img/common/exp_popup_btn_next.png" alt="다음으로" /></button>
                <button id="btnRetry"><img src="img/common/exp_popup_btn_retry.png" alt="다시 하기" /></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/exp3.js"></script>
  </body>
</html>
