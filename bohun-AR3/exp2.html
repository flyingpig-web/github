<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>EXP② — AR 체험 (크리스마스의 기적)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" type="text/css" media="screen" href="css/import.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.js"></script>
    <script src="js/preload-manifest.js"></script>
    <script src="js/common.js"></script>
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="container">
          <!-- AR 체험은 유니티 담당(웹 미구현). 진입 셸 — 완료 팝업으로 다음 단계 이동 -->
          <div class="cut-bg" style="background-image: url(img/4_EXP2-AR/ar_select_bg.png)"></div>

          <!-- 완료(탑승 완료) 팝업 -->
          <div class="dimmed" id="finishDim">
            <div class="dialog finish">
              <img class="finish-base" src="img/4_EXP2-AR/exp2_popup_finish.png" alt="탑승 완료" />
              <div class="finish-btns">
                <button id="btnNext"><img src="img/4_EXP2-AR/exp_popup_btn_next.png" alt="다음으로" /></button>
                <button id="btnRetry"><img src="img/4_EXP2-AR/exp_popup_btn_retry.png" alt="다시 하기" /></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/exp2.js"></script>
  </body>
</html>
