<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>종묘제례악</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div
          class="dimmed bg info-1"
          style="background-color: transparent !important"
        ></div>
        <div class="dimmed bg tutorial display-none">
          <div class="close" role="button"></div>
        </div>

        <div class="select-main pointer-none">
          <div class="container select-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="play-wrap">
              <div class="pad">
                <div class="target-zone pointer-none"></div>
                <div class="target-zone-effect display-none"></div>
                <div class="rail no-moving">
                  <!-- 첫 번째 세트 -->
                  <div class="note">
                    <img src="img/select/notes/dwo.png" alt="드오" />
                    <img
                      src="img/select/notes/dwo-text.png"
                      alt="드오 글자"
                      class="note-text"
                    />
                  </div>
                  <div class="note"></div>
                  <div class="note"></div>
                  <div class="note">
                    <img src="img/select/notes/bak.png" alt="박" />
                    <img
                      src="img/select/notes/bak-text.png"
                      alt="박 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note"></div>
                  <img
                    src="img/select/notes/dot.png"
                    alt="점선"
                    class="note-dot"
                  />
                  <div class="note">
                    <img src="img/select/notes/chook-a.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note"></div>
                  <div class="note">
                    <img src="img/select/notes/chook-a.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note">
                    <img src="img/select/notes/chook-a.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note">
                    <img src="img/select/notes/julgo-a.png" alt="절고" />
                    <img
                      src="img/select/notes/julgo-text.png"
                      alt="절고 글자"
                      class="note-text"
                      style="width: 48%"
                    />
                  </div>
                  <img
                    src="img/select/notes/dot.png"
                    alt="점선"
                    class="note-dot"
                  />
                  <!-- 첫번째 세트 끝 -->
                  <!-- 두번째 세트 -->
                  <div class="note" data-combo="1">
                    <img src="img/select/notes/chook-b.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note"></div>
                  <div class="note">
                    <img src="img/select/notes/chook-b.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note">
                    <img src="img/select/notes/chook-b.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note">
                    <img src="img/select/notes/julgo-b.png" alt="절고" />
                    <img
                      src="img/select/notes/julgo-text.png"
                      alt="절고 글자"
                      class="note-text"
                      style="width: 48%"
                    />
                  </div>
                  <img
                    src="img/select/notes/dot.png"
                    alt="점선"
                    class="note-dot"
                  />
                  <!-- 두번째 세트 끝 -->
                  <!-- 세번째 세트 -->
                  <div class="note" data-combo="2">
                    <img src="img/select/notes/chook-c.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note"></div>
                  <div class="note">
                    <img src="img/select/notes/chook-c.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note">
                    <img src="img/select/notes/chook-c.png" alt="축" />
                    <img
                      src="img/select/notes/chook-text.png"
                      alt="축 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note">
                    <img src="img/select/notes/julgo-c.png" alt="절고" />
                    <img
                      src="img/select/notes/julgo-text.png"
                      alt="절고 글자"
                      class="note-text"
                      style="width: 48%"
                    />
                  </div>
                  <img
                    src="img/select/notes/dot.png"
                    alt="점선"
                    class="note-dot"
                  />
                  <!-- 세번째 세트 끝 -->
                  <!-- 마무리 세트 -->
                  <div class="note" data-combo="3"></div>
                  <div class="note">
                    <img src="img/select/notes/bak.png" alt="박" />
                    <img
                      src="img/select/notes/bak-text.png"
                      alt="박 글자"
                      class="note-text"
                      style="width: 25%"
                    />
                  </div>
                  <div class="note"></div>
                  <div class="note">
                    <img src="img/select/notes/sijak.png" alt="시작" />
                    <img
                      src="img/select/notes/sijak-text.png"
                      alt="시작 글자"
                      class="note-text"
                    />
                  </div>
                </div>
              </div>

              <!-- 콤보 -->
              <img
                class="combo1"
                src="img/select/combo1.png"
                alt="1번 연주 성공"
              />
              <img
                class="combo2"
                src="img/select/combo2.png"
                alt="2번 연주 성공"
              />
              <img
                class="combo3"
                src="img/select/combo3.png"
                alt="3번 연주 성공"
              />

              <!-- 연주자들 -->
              <img
                class="player"
                src="img/select/player1.png"
                alt="박"
                id="player1"
                data-instrumental="bak"
              />
              <img
                class="spotlight"
                src="img/select/spotlight.png"
                alt="spotlight"
                id="spotlight1"
              />
              <img
                class="player"
                src="img/select/player2.png"
                alt="축"
                id="player2"
                data-instrumental="chook"
              />
              <img
                class="spotlight"
                src="img/select/spotlight.png"
                alt="spotlight"
                id="spotlight2"
              />
              <img
                class="player"
                src="img/select/player3.png"
                alt="시작"
                id="player3"
                data-instrumental="sijak"
              />
              <img
                class="spotlight"
                src="img/select/spotlight.png"
                alt="spotlight"
                id="spotlight3"
              />
              <img
                class="player"
                src="img/select/player4.png"
                alt="절고"
                id="player4"
                data-instrumental="julgo"
              />
              <img
                class="spotlight"
                src="img/select/spotlight.png"
                alt="spotlight"
                id="spotlight4"
              />
              <img
                class="player"
                src="img/select/player5.png"
                alt="드오"
                id="player5"
                data-instrumental="dwo"
              />
              <img
                class="spotlight"
                src="img/select/spotlight.png"
                alt="spotlight"
                id="spotlight5"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="select-1-success display-none dimmed">
        <div class="sign-board"></div>
      </div>

      <div class="ktm-wrapper dimmed display-none">
        <div class="container">
          <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
          <img
            src="img/common/ktm_card_off.png"
            class="ktm-card-off"
            role="button"
          />

          <a class="btn-replay" role="button" href="select1.html"></a>
          <a class="btn-home" role="button" href="main.html"></a>
        </div>
      </div>

      <audio id="bgm-tutorial" src="sound/dubs/ch3_04.mp3"></audio>
      <!-- 7초 -->
      <audio id="bgm-main" src="sound/dubs/ch3_05.mp3"></audio>
      <audio id="heemun" src="sound/external/heemun.mp3"></audio>
      <audio id="effect" src="sound/effect/active_effect.mp3"></audio>
      <audio id="heemun-finish" src="sound/sfx/heemun.mp3"></audio>
      <audio id="success" src="sound/sfx/result_shimmer_01.wav"></audio>
      <audio id="finish-sound" src="sound/dubs/ch3_06.mp3"></audio>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select1.js"></script>
  </body>
</html>
