<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>종묘제례악</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div
          class="dimmed bg info-1"
          style="background-color: transparent !important"
        ></div>
        <div
          class="dimmed bg tutorial-2 pointer-none"
          style="background-color: transparent !important; z-index: 9"
        >
          <img
            role="button"
            src="img/select2/start-btn.png"
            alt="숨은 어 찾기 시작"
            class="start-btn"
          />
        </div>
        <div class="dimmed bg tutorial-2-popup-wrapper display-none">
          <img
            class="tutorial-2-popup"
            alt="숨은 어 찾기 팝업"
            src="img/select2/tutorial-popup.png"
          />
          <img
            class="tutorial-2-popup-close popup-close-yes"
            alt="숨은 어 찾기 시작"
            src="img/common/yes.png"
            style="left: 32%"
            role="button"
          />
          <img
            class="tutorial-2-popup-close popup-close-no"
            alt="숨은 어 찾기 팝업 닫기"
            src="img/common/no.png"
            style="left: 52%"
            role="button"
          />
        </div>

        <div class="select-main-2 pointer-none display-none">
          <div class="container select-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="play-wrap">
              <div class="progress-bar">
                <div class="progress-bar-fill"></div>
              </div>
              <img src="img/select2/clock.png" alt="시계" class="clock" />

              <!-- targets -->
              <!-- 어 -->
              <div
                class="target click-point-1"
                data-sound="target-1"
                role="button"
              >
                <img
                  src="img/select2/correct.png"
                  alt="완료"
                  class="display-none"
                />
              </div>
              <img
                src="img/select2/target-1.png"
                alt="어"
                class="target target-1 display-none"
              />

              <!-- 절고 -->
              <div
                class="target click-point-2"
                data-sound="target-2"
                role="button"
              >
                <img
                  src="img/select2/correct.png"
                  alt="완료"
                  class="display-none"
                />
              </div>
              <img
                src="img/select2/target-2.png"
                alt="절고"
                class="target target-2 display-none"
              />

              <!-- 박 -->
              <div
                class="target click-point-3"
                data-sound="target-3"
                role="button"
              >
                <img
                  src="img/select2/correct.png"
                  alt="완료"
                  class="display-none"
                />
              </div>
              <img
                src="img/select2/target-3.png"
                alt="박"
                class="target target-3 display-none"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="select-2-success display-none dimmed">
        <a
          href="?restart=true"
          style="
            position: absolute;
            top: 50%;
            left: 28%;
            width: 20%;
            height: 20%;
          "
        >
          <img src="img/common/replay.png" alt="다시 하기" role="button" />
        </a>
        <a
          href="select3.html"
          style="
            position: absolute;
            top: 50%;
            left: 52%;
            width: 20%;
            height: 20%;
          "
        >
          <img src="img/common/next.png" alt="다음 보기" role="button" />
        </a>
      </div>

      <!-- <div class="ktm-wrapper dimmed">
        <div class="container">
          <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
          <img
            src="img/common/ktm_card_off.png"
            class="ktm-card-off"
            role="button"
          />

          <a class="btn-replay" role="button" href="select1.html"></a>
          <a class="btn-home" role="button" href="main.html"></a>
        </div>
      </div> -->

      <!-- sounds -->
      <audio id="bgm-tutorial" src="sound/dubs/ch3_10.mp3"></audio>
      <audio id="bgm-main" src="sound/dubs/ch3_11.mp3"></audio>
      <audio id="target-1" src="sound/dubs/ch3_12.mp3"></audio>
      <audio id="target-2" src="sound/dubs/ch3_14.mp3"></audio>
      <audio id="target-3" src="sound/dubs/ch3_13.mp3"></audio>
      <audio id="yuk-seong-1" src="sound/sfx/yuk-seong-1.mp3"></audio>
      <audio id="result-failed" src="sound/sfx/result_fail_01.wav"></audio>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select2.js"></script>
  </body>
</html>
