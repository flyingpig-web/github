<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>종묘제례악</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="select-main-3">
          <div class="container select-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="play-wrap">
              <img
                src="img/select3/player.png"
                alt="연주자"
                id="select-3-player"
                role="button"
              />
              <img
                src="img/select3/player-active.png"
                alt="연주자 활성화"
                id="select-3-player-active"
                class="display-none"
              />

              <img
                src="img/select3/cursor.png"
                alt="커서"
                id="select-3-cursor"
              />
              <img
                src="img/select3/jio.png"
                alt="지오"
                id="select-3-jio"
                class="display-none"
              />

              <img src="img/select3/bak.png" alt="박" id="select-3-bak" />
              <img
                src="img/select3/bak-active.png"
                alt="박 활성화"
                id="select-3-bak-active"
                class="display-none"
              />
              <img src="img/select3/julgo.png" alt="절고" id="select-3-julgo" />
              <img
                src="img/select3/moktui.png"
                alt="목퇴"
                id="select-3-moktui"
                class="display-none"
              />
              <img
                src="img/select3/chae.png"
                alt="채"
                id="select-3-chae"
                class="display-none"
              />

              <img src="img/select3/uh.png" alt="어" id="select-3-uh" />

              <div
                style="top: 39%; left: 14%"
                class="select-3-note-wrapper display-none"
              >
                <img class="select-3-note" src="img/select3/note-1.png" />
                <img class="select-3-note" src="img/select3/note-2.png" />
                <img class="select-3-note" src="img/select3/note-3.png" />
              </div>

              <div
                style="top: 29%; left: 31%; width: 9%; height: 9%"
                class="select-3-note-wrapper display-none"
              >
                <img class="select-3-note" src="img/select3/note-1.png" />
                <img class="select-3-note" src="img/select3/note-2.png" />
                <img class="select-3-note" src="img/select3/note-3.png" />
              </div>

              <div
                style="top: 21%; left: 50%; width: 9%; height: 9%"
                class="select-3-note-wrapper display-none"
              >
                <img class="select-3-note" src="img/select3/note-1.png" />
                <img class="select-3-note" src="img/select3/note-2.png" />
                <img class="select-3-note" src="img/select3/note-3.png" />
              </div>
            </div>
          </div>
        </div>
        <div class="select-3-success display-none dimmed">
          <img
            src="img/select3/success_eunjae.png"
            alt="성공"
            style="scale: 0.9"
          />
        </div>
      </div>

      <div class="ktm-wrapper dimmed display-none">
        <div class="container">
          <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
          <img
            src="img/common/ktm_card_off.png"
            class="ktm-card-off"
            role="button"
          />

          <a class="btn-replay" role="button" href="select3.html"></a>
          <a class="btn-home" role="button" href="main.html"></a>
        </div>
      </div>

      <!-- sounds -->
      <audio id="main-bgm" src="sound/sfx/yuk-seong-2.mp3"></audio>
      <audio id="success-bgm" src="sound/sfx/result_shimmer_01.wav"></audio>
      <audio id="ch3-15" src="sound/dubs/ch3_15.mp3"></audio>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select3.js"></script>
  </body>
</html>
