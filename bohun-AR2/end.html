<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>편지 — 청산리 전투 승리</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.js"></script>
    <script src="js/preload-manifest.js"></script>
    <script src="js/common.js"></script>
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="container">
          <div class="cut-bg end-bg"></div>

          <!-- 좌측: 이름 입력 -->
          <div class="end-form">
            <div class="form-box">
              <img class="box-img" src="img/5_End/end_text_box.png" alt="" />
              <input
                type="text"
                class="name-input"
                id="nameInput"
                maxlength="12"
                placeholder="이름 입력..."
                aria-label="이름 입력"
              />
            </div>
          </div>

          <!-- 우측: 편지 -->
          <div class="end-cert" id="cert">
            <img class="cert-img" src="img/5_End/end_image.png" alt="편지" />
            <p class="cert-name" id="certName"></p>
          </div>

          <!-- 하단 버튼 -->
          <div class="end-btns">
            <button id="btnScrap">
              <img src="img/5_End/end_scrap.png" alt="편지 보관하기" />
            </button>
            <button id="btnHome">
              <img src="img/5_End/end_home.png" alt="처음으로" />
            </button>
          </div>
        </div>
      </div>
    </main>
    <script src="js/end-cert-base64.js"></script>
    <script src="js/end.js"></script>
  </body>
</html>
