<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>해금 알기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div
          class="dimmed bg info-1"
          style="background-color: transparent !important"
        ></div>
        <div class="dimmed bg tutorial display-none">
          <div class="close" role="button"></div>
        </div>

        <div class="select-main pointer-none">
          <div class="container select-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="play-wrap">
              <div class="select-1">
                <div class="left-box">
                  <img src="img/select/haegeum/body.png" id="haegeum-body" />
                  <img src="img/select/haegeum/neck.png" id="haegeum-neck" />
                  <img src="img/select/haegeum/bow.png" id="haegeum-bow" />
                  <img src="img/select/haegeum/jua.png" id="haegeum-jua" />
                </div>
                <div class="right-box">
                  <div class="menu">
                    <img
                      src="img/select/haegeum/menu-neck.png"
                      id="target-menu"
                    />

                    <div class="target-wrap">
                      <div id="target-neck" class="cursor-pointer"></div>
                      <div id="target-body" class="cursor-pointer"></div>
                      <div id="target-jua" class="cursor-pointer"></div>
                      <div id="target-bow" class="cursor-pointer"></div>
                    </div>

                    <img
                      src="img/select/haegeum/paint-blue.png"
                      class="paint cursor-pointer"
                      id="paint-blue"
                    />
                    <img
                      src="img/select/haegeum/paint-pink.png"
                      class="paint cursor-pointer"
                      id="paint-pink"
                    />
                    <img
                      src="img/select/haegeum/paint-green.png"
                      class="paint cursor-pointer"
                      id="paint-green"
                    />
                    <img
                      src="img/select/haegeum/paint-yellow.png"
                      class="paint cursor-pointer"
                      id="paint-yellow"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="select-1-success display-none dimmed">
        <img
          src="img/select/haegeum/success.png"
          class="success-button"
          role="button"
        />
      </div>

      <div class="ktm-wrapper dimmed display-none">
        <div class="container">
          <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
          <img
            src="img/common/ktm_card_off.png"
            class="ktm-card-off"
            role="button"
          />

          <a class="btn-replay" role="button" href="select1.html"></a>
          <a class="btn-home" role="button" href="main.html"></a>
        </div>
      </div>

      <audio id="bgm-tutorial" src="sound/dubs/ch2_05.mp3"></audio>
      <audio id="bgm-main" src="sound/dubs/ch2_06.mp3"></audio>
      <audio id="ch2_07" src="sound/dubs/ch2_07.mp3"></audio>
      <audio id="ch2_08" src="sound/dubs/ch2_08.mp3"></audio>
      <audio id="ch2_09" src="sound/dubs/ch2_09.mp3"></audio>
      <audio id="ch2_10" src="sound/dubs/ch2_10.mp3"></audio>
      <audio id="effect" src="sound/sfx/puzzle_success_01.wav"></audio>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select1.js"></script>
  </body>
</html>
