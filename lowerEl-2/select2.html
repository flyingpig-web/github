<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>해금 알아보기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="select-main-2 pointer-none">
          <div class="container select-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="play-wrap">
              <img
                class="btn-left"
                role="button"
                src="img/select/2/btn-left.png"
                data-hover-image="img/select/2/btn-left-active.png"
              />
              <img
                class="btn-right"
                role="button"
                src="img/select/2/btn-right.png"
                data-hover-image="img/select/2/btn-right-active.png"
              />

              <div class="finish-btn" role="button"></div>

              <div class="select-2-haegeum-wrapper">
                <img
                  src="img/select/2/outline/outline-0-deg.png"
                  id="haegeum-outline"
                />
                <img src="img/select/2/body/body-0-deg.png" id="haegeum-body" />
                <img src="img/select/2/neck/neck-0-deg.png" id="haegeum-neck" />
                <img src="img/select/2/bow/bow-0-deg.png" id="haegeum-bow" />
                <img src="img/select/2/jua/jua-0-deg.png" id="haegeum-jua" />
                <img src="img/select/2/line/line-0-deg.png" id="haegeum-line" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="select-2-success dimmed display-none">
        <img
          src="img/select/detail/success_eunjae.png"
          alt="성공"
          class="success-board"
        />
      </div>

      <div class="ktm-wrapper display-none dimmed">
        <div class="container">
          <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
          <img
            src="img/common/ktm_card_off.png"
            class="ktm-card-off"
            role="button"
          />

          <a class="btn-replay" role="button" onclick="location.reload()"></a>
          <a class="btn-home" role="button" href="main.html"></a>
        </div>
      </div>

      <audio id="bgm-tutorial" src="sound/dubs/ch2_11.mp3"></audio>
      <audio id="bgm-success" src="sound/sfx/card_expand_01.wav"></audio>

      <!-- 이미지 프리로드 -->
      <div id="preload-images" style="display: none">
        <!-- 0도 -->
        <img src="img/select/2/outline/outline-0-deg.png" />
        <img src="img/select/2/body/body-0-deg.png" />
        <img src="img/select/2/neck/neck-0-deg.png" />
        <img src="img/select/2/bow/bow-0-deg.png" />
        <img src="img/select/2/jua/jua-0-deg.png" />
        <img src="img/select/2/line/line-0-deg.png" />
        <!-- 45도 -->
        <img src="img/select/2/outline/outline-45-deg.png" />
        <img src="img/select/2/body/body-45-deg.png" />
        <img src="img/select/2/neck/neck-45-deg.png" />
        <img src="img/select/2/bow/bow-45-deg.png" />
        <img src="img/select/2/jua/jua-45-deg.png" />
        <img src="img/select/2/line/line-45-deg.png" />
        <!-- 90도 -->
        <img src="img/select/2/outline/outline-90-deg.png" />
        <img src="img/select/2/body/body-90-deg.png" />
        <img src="img/select/2/neck/neck-90-deg.png" />
        <img src="img/select/2/bow/bow-90-deg.png" />
        <img src="img/select/2/jua/jua-90-deg.png" />
        <img src="img/select/2/line/line-90-deg.png" />
        <!-- 135도 -->
        <img src="img/select/2/outline/outline-135-deg.png" />
        <img src="img/select/2/body/body-135-deg.png" />
        <img src="img/select/2/neck/neck-135-deg.png" />
        <img src="img/select/2/bow/bow-135-deg.png" />
        <img src="img/select/2/jua/jua-135-deg.png" />
        <img src="img/select/2/line/line-135-deg.png" />
        <!-- 180도 -->
        <img src="img/select/2/outline/outline-180-deg.png" />
        <img src="img/select/2/body/body-180-deg.png" />
        <img src="img/select/2/neck/neck-180-deg.png" />
        <img src="img/select/2/bow/bow-180-deg.png" />
        <img src="img/select/2/jua/jua-180-deg.png" />
        <img src="img/select/2/line/line-180-deg.png" />
        <!-- 225도 -->
        <img src="img/select/2/outline/outline-225-deg.png" />
        <img src="img/select/2/body/body-225-deg.png" />
        <img src="img/select/2/neck/neck-225-deg.png" />
        <img src="img/select/2/bow/bow-225-deg.png" />
        <img src="img/select/2/jua/jua-225-deg.png" />
        <img src="img/select/2/line/line-225-deg.png" />
        <!-- 270도 -->
        <img src="img/select/2/outline/outline-270-deg.png" />
        <img src="img/select/2/body/body-270-deg.png" />
        <img src="img/select/2/neck/neck-270-deg.png" />
        <img src="img/select/2/bow/bow-270-deg.png" />
        <img src="img/select/2/jua/jua-270-deg.png" />
        <img src="img/select/2/line/line-270-deg.png" />
        <!-- 315도 -->
        <img src="img/select/2/outline/outline-315-deg.png" />
        <img src="img/select/2/body/body-315-deg.png" />
        <img src="img/select/2/neck/neck-315-deg.png" />
        <img src="img/select/2/bow/bow-315-deg.png" />
        <img src="img/select/2/jua/jua-315-deg.png" />
        <img src="img/select/2/line/line-315-deg.png" />
      </div>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select2.js"></script>
  </body>
</html>
