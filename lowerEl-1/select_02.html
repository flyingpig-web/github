<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>거문고 알아보기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="select-main">
          <div class="container select-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <div class="select-title"></div>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="select-02">
              <div class="play-wrap">
                <!-- 퍼즐 메인 보드 -->
                <div class="board">
                  <div class="piece-wrapper">
                    <!-- 9개의 퍼즐 조각들 -->
                    <div class="piece piece-1"></div>
                    <div class="piece piece-2"></div>
                    <div class="piece piece-3"></div>
                    <div class="piece piece-4"></div>
                    <div class="piece piece-5"></div>
                    <div class="piece piece-6"></div>
                    <div class="piece piece-7"></div>
                    <div class="piece piece-8"></div>
                    <div class="piece piece-9"></div>
                  </div>

                  <!-- 좌우 트레이 -->
                  <div class="tray" id="tray-left"></div>
                  <div class="tray" id="tray-right"></div>
                </div>

                <!-- 완성 이미지 -->
                <div class="select-02-completed-img"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="select-02-success dimmed">
          <div class="sign-board"></div>
          <div
            class="select-02-success-out"
            onclick="window.location.href='main.html'"
            role="button"
          ></div>
          <div
            class="select-02-success-next"
            onclick="window.location.href='select_02.html'"
            role="button"
          ></div>
        </div>

        <div class="ktm-wrapper dimmed">
          <div class="container">
            <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
            <img
              src="img/common/ktm_card_off.png"
              class="ktm-card-off"
              role="button"
            />

            <a class="btn-replay" role="button" href="select_01.html"></a>
            <a class="btn-home" role="button" href="main.html"></a>
          </div>
        </div>
      </div>

      <!-- 나레이션 9초 -->
      <audio id="bgm" src="sound/narration/cho3_n_5.mp3"></audio>

      <!-- <audio id="bgm" src="sound/bgm/active_bgm.mp3" loop></audio> -->
      <audio id="effect" src="sound/effect/active_effect.mp3"></audio>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select_02.js"></script>
  </body>
</html>
