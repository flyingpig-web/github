<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>거문고 알아보기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="select-main">
          <div class="container select-04-bg">
            <a
              onclick="window.history.back()"
              class="btn-top btn-back btn-effect"
              role="button"
            >
              <span class="sr-only">뒤로가기</span>
            </a>

            <div class="select-title-3"></div>

            <a
              href="main.html"
              class="btn-top btn-home btn-effect"
              role="button"
            >
              <span class="sr-only">홈으로</span>
            </a>

            <!-- Play -->
            <div class="select-04">
              <div class="select-04-main-geomungo-wrapper">
                <div class="geomungo-container">
                  <img
                    alt="거문고"
                    class="geomungo-image"
                    style="max-width: 100%"
                  />
                </div>
              </div>
            </div>

            <div class="select-04-control-search-btn" role="button"></div>
            <div class="select-04-control-up-btn" role="button"></div>
            <div class="select-04-control-down-btn" role="button"></div>
            <div class="select-04-control-finish-btn" role="button"></div>
          </div>
        </div>

        <div class="ktm-wrapper dimmed">
          <div class="container">
            <img src="img/common/ktm_card.png" class="ktm-card" role="button" />
            <img
              src="img/common/ktm_card_off.png"
              class="ktm-card-off"
              role="button"
            />

            <a class="btn-replay" role="button" href="select_03.html"></a>
            <a class="btn-home" role="button" href="main.html"></a>
          </div>
        </div>
      </div>

      <div class="select-03-success dimmed">
        <div class="sign-board"></div>
      </div>
    </main>

    <!-- Scripts loaded after DOM is ready -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/select_04.js"></script>
  </body>
</html>
