<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>해금 파츠별 색상 적용</title>
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/common.css"
    />
  </head>
  <body>
    <h1>해금 파츠별 색상 적용 데모</h1>

    <div class="stage">
      <div class="part pegbox" id="pegbox"></div>
      <div class="part neck" id="neck"></div>
      <div class="part body" id="body"></div>
      <div class="part bow" id="bow"></div>
    </div>

    <div class="controls">
      <label
        >줄감개 색상 <input type="color" id="cPeg" value="#7ACBFF"
      /></label>
      <label>목대 색상 <input type="color" id="cNeck" value="#FFD966" /></label>
      <label
        >울림통 색상 <input type="color" id="cBody" value="#93C47D"
      /></label>
      <label>활대 색상 <input type="color" id="cBow" value="#E06666" /></label>
    </div>

    <!-- 마스크 PNG를 로컬에서 고르는 입력 (CORS 회피용) -->
    <div class="controls" style="margin-top: 8px">
      <label
        >줄감개 마스크 <input type="file" id="mPeg" accept="image/*"
      /></label>
      <label
        >목대 마스크 <input type="file" id="mNeck" accept="image/*"
      /></label>
      <label
        >울림통 마스크 <input type="file" id="mBody" accept="image/*"
      /></label>
      <label
        >활대 마스크 <input type="file" id="mBow" accept="image/*"
      /></label>
    </div>

    <script>
      // 파츠 엘리먼트
      const parts = {
        pegbox: document.getElementById("pegbox"),
        neck: document.getElementById("neck"),
        body: document.getElementById("body"),
        bow: document.getElementById("bow"),
      };

      // 색상 변경
      document
        .getElementById("cPeg")
        .addEventListener(
          "input",
          (e) => (parts.pegbox.style.background = e.target.value)
        );
      document
        .getElementById("cNeck")
        .addEventListener(
          "input",
          (e) => (parts.neck.style.background = e.target.value)
        );
      document
        .getElementById("cBody")
        .addEventListener(
          "input",
          (e) => (parts.body.style.background = e.target.value)
        );
      document
        .getElementById("cBow")
        .addEventListener(
          "input",
          (e) => (parts.bow.style.background = e.target.value)
        );

      // 파일 → dataURL → mask-image 적용 (file://에서도 CORS 없이 동작)
      function wireMask(fileInputId, targetEl) {
        const input = document.getElementById(fileInputId);
        input.addEventListener("change", () => {
          const file = input.files && input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            const url = reader.result; // data:image/png;base64,....
            targetEl.style.webkitMaskImage = `url("${url}")`;
            targetEl.style.maskImage = `url("${url}")`;
            // 공통 CSS에서 size/position/repeat은 이미 지정되어 있음
          };
          reader.readAsDataURL(file);
        });
      }

      wireMask("mPeg", parts.pegbox);
      wireMask("mNeck", parts.neck);
      wireMask("mBody", parts.body);
      wireMask("mBow", parts.bow);

      // 참고: 서버 환경(예: Live Server)이라면 CSS의 url(../img/*.png)도 정상 작동합니다.
    </script>
  </body>
</html>
