<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>메기고 받기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="container">
          <a href="main.html" class="btn-top btn-home" role="button">
            <span class="sr-only">홈으로</span>
          </a>

          <a
            class="btn-top btn-back"
            role="button"
            onclick="window.history.back()"
          >
            <span class="sr-only">뒤로가기</span>
          </a>

          <div class="dimmed bg tutorial-bg">
            <div class="close" role="button"></div>
          </div>

          <div class="select-main">
            <div class="select-bg">
              <img src="img/select-1/dan.png" class="dan" />
              <img src="img/select-1/hong.png" class="hong" />
              <img src="img/select-1/miyo.png" class="miyo stop" />
              <img class="select-1-glow" src="img/glow/glow-01.png" />
              <div class="belt"></div>
              <img src="img/select-1/touch-point.png" class="touch-point" />

              <div class="strawberry-move-wrapper"></div>
              <div class="guage-wrapper">
                <img src="img/select-1/guage.png" />
                <!-- <img
                  src="img/select-1/strawberry-guage.png"
                  class="strawberry-guage"
                  /> -->
              </div>
              <img src="img/select-1/progress-bar.png" class="progress-bar" />
              <img
                src="img/select-1/progress-bar-fill.png"
                class="progress-bar-fill"
              />
              <img src="img/select-1/arrow.png" class="select-1-arrow" />
            </div>

            <div class="dimmed select-completed display-none">
              <div class="finish-animation" style="left: 22.5%"></div>
              <div class="finish-animation" style="left: 68%"></div>
              <img src="img/select-1/success-ment.png" class="success-ment" />
            </div>

            <div class="display-none dimmed finish-bg pointer-none">
              <img
                src="img/select-1/strawberry-finish.png"
                class="strawberry-finish"
              />

              <img
                src="img/select-1/strawberry-finish-half.png"
                class="strawberry-finish-half pointer-none"
              />

              <img
                src="img/common/message.png"
                class="strawberry-finish-message pointer-none"
              />

              <img
                src="img/common/replay.png"
                alt="다시하기"
                role="button"
                onclick="location.reload()"
                style="
                  width: 15vw;
                  height: 10vh;
                  top: 75%;
                  left: 33%;
                  position: absolute;
                "
              />

              <img
                src="img/common/exit.png"
                alt="나가기"
                role="button"
                onclick="window.location.href='main.html'"
                style="
                  width: 15vw;
                  height: 10vh;
                  top: 75%;
                  left: 52%;
                  position: absolute;
                "
              />
            </div>

            <div class="message-content dimmed display-none">
              <img
                class="message-content-close"
                role="button"
                src="img/common/close.png"
                style="
                  width: 10vw;
                  height: 10vh;
                  position: absolute;
                  top: 13%;
                  right: 25%;
                "
              />
            </div>
          </div>
        </div>
      </div>
    </main>

    <audio id="bgm-tutorial" src="sound/dubs/Yu1_05.mp3"></audio>
    <audio id="bgm-main" src="sound/dubs/Yu1_06.mp3"></audio>
    <audio id="bgm-ar" src="sound/external/yu1-ar.mp3" volume="0.5"></audio>
    <audio id="bgm-mr" src="sound/external/yu1-mr.mp3" volume="0.5"></audio>

    <audio id="bgm-congratulation" src="sound/dubs/Yu1_07.mp3"></audio>
    <audio id="bgm-finish" src="sound/dubs/Yu1_08.mp3"></audio>
    <audio id="bgm-finish-2" src="sound/dubs/Yu1_09.mp3"></audio>
    <audio id="message-sound" src="sound/dubs/Yu1_10.mp3"></audio>

    <audio id="bgm-card-open" src="sound/sfx/card_open_02.wav"></audio>

    <audio
      id="round-success-sound"
      src="sound/sfx/puzzle_success_01.wav"
    ></audio>

    <script src="js/common.js"></script>
    <script src="js/select-1.js"></script>
  </body>
</html>
