<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>메기고 받기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/import.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
  </head>
  <body>
    <main>
      <div class="wrap">
        <div class="container">
          <a href="main.html" class="btn-top btn-home" role="button">
            <span class="sr-only">홈으로</span>
          </a>

          <a
            class="btn-top btn-back"
            role="button"
            onclick="window.history.back()"
          >
            <span class="sr-only">뒤로가기</span>
          </a>

          <div class="dimmed bg info-1"></div>
          <div class="dimmed bg tutorial-bg-2 display-none">
            <div class="close" role="button"></div>
          </div>

          <div class="select-main">
            <div class="select-2-bg">
              <div class="wm-wrapper">
                <img src="img/select-2/wm1.png" class="wm" data-wm="1" />
                <img src="img/select-2/wm2.png" class="wm" data-wm="2" />
                <img src="img/select-2/wm3.png" class="wm" data-wm="3" />
                <img src="img/select-2/wm4.png" class="wm" data-wm="4" />
                <img src="img/select-2/wm5.png" class="wm" data-wm="5" />
                <img src="img/select-2/wm6.png" class="wm" data-wm="6" />
                <img src="img/select-2/wm7.png" class="wm" data-wm="7" />
                <img src="img/select-2/wm8.png" class="wm" data-wm="8" />
                <img src="img/select-2/wm9.png" class="wm" data-wm="9" />
              </div>
            </div>

            <div class="dimmed select-completed display-none">
              <div class="finish-animation" style="left: 22.5%"></div>
              <div class="finish-animation" style="left: 68%"></div>
              <img src="img/select-2/success-ment.png" />
            </div>

            <div class="display-none dimmed finish-bg pointer-none">
              <img
                src="img/select-2/wm-finish.png"
                class="wm-finish"
                role="button"
              />

              <img
                src="img/select-2/wm-finish-half.png"
                class="wm-finish-half pointer-none"
                role="button"
              />

              <img
                src="img/common/message.png"
                class="wm-finish-message pointer-none"
                role="button"
              />

              <img
                src="img/common/replay.png"
                alt="다시하기"
                role="button"
                onclick="location.reload()"
                style="
                  width: 15vw;
                  height: 10vh;
                  top: 75%;
                  left: 33%;
                  position: absolute;
                "
              />

              <img
                src="img/common/exit.png"
                alt="나가기"
                role="button"
                onclick="window.location.href='main.html'"
                style="
                  width: 15vw;
                  height: 10vh;
                  top: 75%;
                  left: 52%;
                  position: absolute;
                "
              />
            </div>

            <div class="message-content-2 dimmed display-none">
              <img
                class="message-content-close"
                role="button"
                src="img/common/close.png"
                style="
                  width: 10vw;
                  height: 10vh;
                  position: absolute;
                  top: 13%;
                  right: 25%;
                "
              />
            </div>
          </div>
        </div>
      </div>
    </main>

    <img id="custom-cursor" src="img/select-2/cursor.png" />

    <audio id="bgm-tutorial" src="sound/dubs/Yu1_11.mp3"></audio>
    <audio id="bgm-main" src="sound/dubs/Yu1_12.mp3"></audio>

    <audio id="bgm-pattern-1" src="sound/external/yu1-2-1.mp3"></audio>
    <audio id="bgm-pattern-2" src="sound/external/yu1-2-2.mp3"></audio>
    <audio id="bgm-pattern-3" src="sound/external/yu1-2-3.mp3"></audio>
    <audio id="bgm-pattern-4" src="sound/external/yu1-2-4.mp3"></audio>
    <audio id="bgm-pattern-5" src="sound/external/yu1-2-5.mp3"></audio>
    <audio id="bgm-pattern-6" src="sound/external/yu1-2-6.mp3"></audio>
    <audio id="bgm-pattern-7" src="sound/external/yu1-2-7.mp3"></audio>
    <audio id="bgm-pattern-8" src="sound/external/yu1-2-8.mp3"></audio>

    <audio id="bgm-finish" src="sound/dubs/Yu1_17.mp3"></audio>
    <audio id="bgm-finish-2" src="sound/dubs/Yu1_18.mp3"></audio>
    <audio id="message-sound" src="sound/dubs/Yu1_19.mp3"></audio>

    <script src="js/common.js"></script>
    <script src="js/select-2.js"></script>
  </body>
</html>
